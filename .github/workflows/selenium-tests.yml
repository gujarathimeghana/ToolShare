name: Run Selenium E2E Web Tests & Generate Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  selenium-e2e-tests:
    name: Run Selenium E2E Tests (300+ Test Cases)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome Browser for Selenium
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Selenium Test Dependencies
        run: |
          cd selenium-tests
          npm install

      - name: Execute Selenium E2E Test Suite (300+ Test Cases)
        env:
          TEST_URL: 'https://toolshare-production-e02e.up.railway.app'
        run: |
          cd selenium-tests
          npm test

      - name: Upload Excel Test Report Artifact (300+ Test Cases)
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report-xlsx
          path: selenium-tests/selenium_test_report.xlsx
