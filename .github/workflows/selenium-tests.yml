name: 2. Selenium Web E2E Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  selenium-web-tests:
    name: Run 305 Selenium Web E2E Test Cases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Selenium Suite Dependencies
        run: |
          cd selenium-tests
          npm install

      - name: Run 305 Selenium Web Test Cases
        run: |
          cd selenium-tests
          npm test

      - name: Upload Selenium Web Test Report Artifact (selenium_test_report.xlsx)
        uses: actions/upload-artifact@v4
        with:
          name: selenium_test_report_excel
          path: selenium-tests/selenium_test_report.xlsx
