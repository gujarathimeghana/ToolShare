name: 1. Backend REST API Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend-api-tests:
    name: Run 305 Backend REST API Test Cases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd server
          npm install

      - name: Run 305 Backend API Test Cases
        run: |
          cd server
          npm test

      - name: Upload Backend Test Report Artifact (backend_test_report.xlsx)
        uses: actions/upload-artifact@v4
        with:
          name: backend_test_report_excel
          path: server/backend_test_report.xlsx
