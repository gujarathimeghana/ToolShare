name: 3. Appium Mobile E2E Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  appium-mobile-tests:
    name: Run 305 Appium Mobile E2E Test Cases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium Suite Dependencies
        run: |
          cd appium-tests
          npm install

      - name: Run 305 Appium Mobile Test Cases
        run: |
          cd appium-tests
          npm test

      - name: Upload Appium Mobile Test Report Artifact (appium_test_report.xlsx)
        uses: actions/upload-artifact@v4
        with:
          name: appium_test_report_excel
          path: appium-tests/appium_test_report.xlsx
