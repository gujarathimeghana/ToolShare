name: Run Appium E2E Mobile Tests & Generate Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  appium-e2e-tests:
    name: Run Appium E2E Mobile Tests (300+ Test Cases)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium Test Dependencies
        run: |
          cd appium-tests
          npm install

      - name: Execute Appium Mobile E2E Test Suite (300+ Test Cases)
        run: |
          cd appium-tests
          npm test

      - name: Upload Appium Excel Test Report Artifact (300+ Test Cases)
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-report-xlsx
          path: appium-tests/appium_test_report.xlsx
