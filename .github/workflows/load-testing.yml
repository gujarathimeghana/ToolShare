name: Load Testing

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  k6-load-test:
    name: Grafana k6 REST API Baseline Load Test (100 VUs / 60s)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Server Dependencies
        run: |
          cd server
          npm install

      - name: Install Grafana k6 Load Testing CLI
        run: |
          sudo gpg -k || true
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6643728
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Execute k6 Load Test (100 VUs for 1 Minute)
        env:
          API_URL: 'https://toolshare-production-e02e.up.railway.app/api'
        run: |
          k6 run server/tests/k6-backend-load.js

      - name: Generate Load Testing Reports (Excel, JSON, TXT - 300+ Test Cases)
        run: |
          cd server
          node tests/generate-load-reports.js

      - name: Publish Load Testing Summary to GitHub Step Summary
        run: |
          if [ -f load-test-summary.txt ]; then
            cat load-test-summary.txt >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Load Testing Artifacts (Excel, HTML, JSON, TXT)
        uses: actions/upload-artifact@v4
        with:
          name: load-testing-reports
          path: |
            load-test-report.xlsx
            load_test_report.html
            load-test-report.json
            load-test-summary.txt
