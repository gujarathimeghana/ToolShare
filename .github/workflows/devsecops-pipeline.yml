name: DevSecOps & Performance Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  secret-and-dependency-scan:
    name: 1. Secret Scanning & Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend Dependency Audit (npm audit)
        run: |
          cd server
          npm audit || true

      - name: Web Frontend Dependency Audit (npm audit)
        run: |
          cd client-web
          npm audit || true

  sast-code-linting:
    name: 2. Static Code & Quality Analysis (SAST)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Run Code Linter
        run: |
          cd server
          npm install --no-audit
          npm test:unit

  baseline-load-testing:
    name: 3. k6 Baseline Load Testing (100 VUs / 60s)
    runs-on: ubuntu-latest
    needs: [secret-and-dependency-scan, sast-code-linting]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Grafana k6 Load Testing CLI
        run: |
          sudo gpg -k || true
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6643728
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Execute k6 Backend Load Test
        env:
          API_URL: 'https://toolshare-production-e02e.up.railway.app/api'
        run: |
          k6 run server/tests/k6-backend-load.js

      - name: Publish Summary to GitHub Step Summary
        run: |
          if [ -f load_test_summary.md ]; then
            cat load_test_summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Load Testing Artifacts (HTML, JSON, Markdown)
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-load-test-reports
          path: |
            load_test_report.html
            load_test_report.json
            load_test_summary.md
