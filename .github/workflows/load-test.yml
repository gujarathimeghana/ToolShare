name: Run Baseline & Load Testing (100 Virtual Users)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  baseline-load-testing:
    name: Run 100 Virtual Users Load Test (60 Seconds)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Test Dependencies
        run: |
          cd server
          npm install

      - name: Execute Load Test (100 Virtual Users for 60s)
        env:
          API_URL: 'https://toolshare-production-e02e.up.railway.app/api'
          VIRTUAL_USERS: '100'
          TEST_DURATION: '60'
        run: |
          cd server
          npm run test:load

      - name: Upload Load Test Excel Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report-xlsx
          path: server/load_test_report.xlsx
