name: Backend Load Testing

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  k6-backend-load-test:
    name: k6 REST API Baseline Load Test (100 VUs / 60s)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Grafana k6 Load Testing CLI
        run: |
          sudo gpg -k || true
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6643728
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Execute k6 Backend API Load Test
        env:
          API_URL: 'https://toolshare-production-e02e.up.railway.app/api'
        run: |
          k6 run server/tests/k6-backend-load.js

      - name: Publish k6 Summary to GitHub Step Summary
        run: |
          if [ -f load_test_summary.md ]; then
            cat load_test_summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload k6 Load Testing Artifacts (HTML, JSON, Markdown)
        uses: actions/upload-artifact@v4
        with:
          name: k6-backend-load-test-reports
          path: |
            load_test_report.html
            load_test_report.json
            load_test_summary.md
